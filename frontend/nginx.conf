server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (React Flow usa rutas client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para assets con hash; el index nunca se cachea.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
